services:
  backend:
    build: ./backend
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    environment:
      # Allow frontend container origin
      FRONTEND_ORIGIN: "http://localhost:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    environment:
      # Frontend will call backend through host-mapped port
      VITE_API_URL: "http://localhost:5001"
    depends_on:
      - backend
    restart: unless-stopped